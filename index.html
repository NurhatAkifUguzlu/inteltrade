<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelTrade - Zenginlik Kartopu Takipçisi</title>
    <meta name="description" content="A modern fintech compound investment tracker to visualize snowball growth.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Authentication View -->
    <div id="auth-view" class="view-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>IntelTrade</h1>
                <p>Zenginliğe Hoş Geldiniz</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Giriş Yap</button>
                <button class="auth-tab" id="tab-signup">Kayıt Ol</button>
            </div>

            <form id="auth-form">
                <div class="form-group">
                    <label for="auth-email">E-posta</label>
                    <input type="email" id="auth-email" required placeholder="ornek@posta.com">
                </div>
                <div class="form-group">
                    <label for="auth-password">Şifre</label>
                    <input type="password" id="auth-password" required placeholder="••••••••">
                </div>
                <div id="auth-error" class="auth-error hidden"></div>
                <button type="submit" class="submit-btn" id="auth-submit-btn">Giriş Yap</button>
            </form>
        </div>
    </div>

    <!-- Main Application View -->
    <div id="app-view" class="view-container hidden">
        <header class="app-header">
            <div class="header-content">
                <h1>IntelTrade</h1>
                <p>Zenginlik Kartopu Takipçisi</p>
            </div>
            <div class="profile-section">
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <span class="profile-email" id="header-user-email"></span>
                    <button id="btn-logout" class="btn-action">Çıkış Yap</button>
                </div>
            </div>
        </header>

        <nav class="app-nav">
            <button class="nav-tab" id="nav-portfolio">Portföyüm</button>
            <button class="nav-tab active" id="nav-social">Keşfet</button>
        </nav>

        <main class="timeline-container hidden" id="portfolio-page">
            <div class="personal-stats-card">
                <div class="stats-header">
                    <div class="stats-title-block">
                        <h3>İstatistiklerim</h3>
                        <span class="profile-email" id="user-email">user@example.com</span>
                    </div>
                    <div class="stats-upload-block">
                        <label for="csv-upload" class="btn-action btn-upload">Geçmişi (CSV) Yükle</label>
                        <input type="file" id="csv-upload" accept=".csv" style="display: none;">
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Toplam Net</div>
                        <div class="stat-value text-accent" id="net-worth-display">$0.00</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Kazanma Oranı</div>
                        <div class="stat-value text-primary" id="win-rate-display">Yok</div>
                    </div>
                </div>
            </div>

            <div class="timeline" id="timeline">
                <!-- Timeline nodes will be injected here -->
            </div>

            <div id="portfolio-feed-list" style="margin-top: 3rem;">
                <!-- Logged-in user posts will be injected here -->
            </div>
        </main>

        <!-- Social Feed View -->
        <main class="social-feed-container" id="discover-page">

            <!-- Compose Post Box -->
            <div class="compose-post-card">
                <h3>Bir Güncelleme Paylaş</h3>
                <form id="compose-post-form">
                    <textarea id="post-content" placeholder="Piyasa görüşünüz nedir?" required></textarea>
                    <input type="text" id="post-basket" placeholder="Paylaşılan Sepet (örn: Altın, TSLA)" required>
                    <div class="compose-actions">
                        <span class="metrics-preview">Mevcut Kazanma Oranınız ve ROI'niz eklenecektir.</span>
                        <button type="submit" class="submit-btn btn-post">Paylaş</button>
                    </div>
                </form>
            </div>

            <!-- Feed Container -->
            <div id="social-feed-list">
                <!-- Posts will be dynamically injected here -->
            </div>
        </main>

        <!-- Dedicated Profile View -->
        <main class="social-feed-container hidden" id="view-profile">
            <button id="btn-back-to-feed" class="btn-action btn-back">&larr; Geri Dön</button>
            <div class="profile-hero-card">
                <div class="profile-user-header">
                    <div class="avatar profile-hero-avatar" id="profile-view-avatar">U</div>
                    <div class="profile-hero-info">
                        <h2 id="profile-view-username">@user</h2>
                        <div class="profile-hero-metrics">
                            <span class="trust-badge">
                                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2"
                                    fill="none">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                </svg>
                                <span id="profile-view-winrate">%0 Başarı</span>
                            </span>
                            <span class="attachment-profit" id="profile-view-roi">+0% ROI</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="profile-feed-list">
                <!-- User specific posts -->
            </div>
        </main>

        <button class="fab hidden" id="fab-add" aria-label="Yatırım Ekle">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>

        <!-- Modal -->
        <div class="modal-overlay" id="add-modal" aria-hidden="true">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Yatırım Ekle</h2>
                    <button class="close-btn" id="close-modal" aria-label="Kapat">&times;</button>
                </div>
                <form id="investment-form">
                    <input type="hidden" id="edit-index" value="-1">
                    <div class="form-group">
                        <label for="inv-date">Tarih</label>
                        <input type="date" id="inv-date" required>
                    </div>
                    <div class="form-group">
                        <label for="inv-name">Yatırım Varlığı (örn. BTC, SPY)</label>
                        <input type="text" id="inv-name" placeholder="Varlık Adı" required>
                    </div>
                    <div class="form-group">
                        <label for="inv-initial">Başlangıç Sermayesi ($)</label>
                        <input type="number" id="inv-initial" step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="inv-final">Son Satış Değeri ($)</label>
                        <input type="number" id="inv-final" step="0.01" min="0" placeholder="0.00" required>
                    </div>
                    <button type="submit" class="submit-btn" id="submit-btn">Yatırımı Kaydet</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Script tags -->
    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(registration => {
                    console.log('ServiceWorker registration successful');
                }).catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
